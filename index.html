<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4CAF50">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%234CAF50' width='192' height='192'/><text x='50%' y='50%' font-size='120' fill='white' text-anchor='middle' dy='.3em'>✓</text></svg>">
  <title>Todo PWA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>My Todos</h1>
      <p class="status" id="status">Loading...</p>
    </header>

    <div class="input-section">
      <input 
        type="text" 
        id="todoInput" 
        placeholder="Add a new todo..." 
        autocomplete="off"
      >
      <button onclick="addTodo()">Add</button>
    </div>

    <div class="filter-buttons">
      <button class="filter-btn active" onclick="filterTodos('all')">All</button>
      <button class="filter-btn" onclick="filterTodos('active')">Active</button>
      <button class="filter-btn" onclick="filterTodos('completed')">Completed</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <footer>
      <p id="todoCount">0 items left</p>
      <button onclick="clearCompleted()">Clear Completed</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
