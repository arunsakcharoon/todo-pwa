<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6c63ff">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%236c63ff' width='192' height='192'/><text x='50%' y='50%' font-size='120' fill='white' text-anchor='middle' dy='.3em'>✓</text></svg>">
  <title>Todo PWA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>My Todos</h1>
      <p class="status" id="status">Loading...</p>
      <div class="stats">
        <span class="stat stat-total"><span id="statTotal">0</span> Total</span>
        <span class="stat stat-active"><span id="statActive">0</span> Active</span>
        <span class="stat stat-done"><span id="statDone">0</span> Done</span>
      </div>
    </header>

    <div class="input-section">
      <input 
        type="text" 
        id="todoInput" 
        placeholder="Add a new todo..." 
        autocomplete="off"
      >
      <button onclick="addTodo()">Add</button>
    </div>

    <div class="filter-buttons">
      <button class="filter-btn active" onclick="filterTodos('all')">All</button>
      <button class="filter-btn" onclick="filterTodos('active')">Active</button>
      <button class="filter-btn" onclick="filterTodos('completed')">Completed</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <footer>
      <p id="todoCount">0 items left</p>
      <button onclick="clearCompleted()">Clear Completed</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
